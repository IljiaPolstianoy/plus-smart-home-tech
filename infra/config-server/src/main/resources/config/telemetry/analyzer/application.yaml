# Конфигурация для Analyzer в Config Server
spring:
  datasource:
    url: jdbc:h2:mem:analyzerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: analyzer-group
      auto-offset-reset: earliest
      enable-auto-commit: false

# Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    enabled: true
    fetch-registry: true
    register-with-eureka: true
  instance:
    hostname: localhost
    prefer-ip-address: false

# gRPC
grpc:
  client:
    hub-router:
      address: discovery:///hub-router-service
      negotiation-type: plaintext
      enableKeepAlive: true
      keepAliveWithoutCalls: true

# Настройки процессоров
processor:
  initialization:
    timeout: 20000
  poll:
    timeout: 1000

# Логирование
logging:
  level:
    ru.yandex.practicum: INFO
    org.springframework: INFO
    com.netflix.discovery: WARN