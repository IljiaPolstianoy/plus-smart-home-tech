spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/analyzer-smart-home
    username: dbuser
    password: 12345
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true

  kafka:
    consumer:
      group-id: analyzer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      enable-auto-commit: false
    properties:
      schema.registry.url: http://localhost:8081
      specific.avro.reader: true

grpc:
  client:
    hub-router:
      address: static://localhost:59090
      negotiation-type: plaintext
      enable-keep-alive: true
      keep-alive-without-calls: true
  server:
    port: 9094

logging:
  level:
    # ВСЕ пакеты проекта на максимальном уровне
    ru.yandex.practicum: TRACE

    # Spring компоненты
    org.springframework.kafka: TRACE
    org.springframework.kafka.listener: TRACE

    # Kafka подробности
    org.apache.kafka: DEBUG
    org.apache.kafka.clients.consumer.ConsumerConfig: DEBUG
    org.apache.kafka.clients.consumer.KafkaConsumer: DEBUG

    # gRPC логи
    io.grpc: DEBUG
    io.grpc.netty: DEBUG

    # Hibernate подробности
    org.hibernate: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type: TRACE
    org.hibernate.stat: DEBUG

    # Spring Boot
    org.springframework.boot.autoconfigure: DEBUG
    org.springframework.context: DEBUG

  file:
    name: logs/analyzer.log
    max-history: 7
    max-size: 10MB

  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
server:
  port: 0