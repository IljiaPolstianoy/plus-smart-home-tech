server:
  port: 0

spring:
  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    # ========== КАСТОМНЫЕ ПАКЕТЫ ==========
    ru.practicum.collector: DEBUG
    ru.practicum: DEBUG

    # ========== GRPC ЛОГИРОВАНИЕ ==========
    io.grpc: DEBUG
    net.devh.boot.grpc: DEBUG

    # ========== KAFKA ОСНОВНОЕ ==========
    org.apache.kafka: INFO
    org.apache.kafka.clients.producer: DEBUG
    org.apache.kafka.clients.producer.internals.Sender: DEBUG
    org.apache.kafka.clients.producer.internals.RecordAccumulator: DEBUG
    org.apache.kafka.clients.producer.internals.TransactionManager: DEBUG

    # ========== СЕТЕВЫЕ КОМПОНЕНТЫ ==========
    org.apache.kafka.clients.NetworkClient: DEBUG
    org.apache.kafka.clients.Metadata: DEBUG
    org.apache.kafka.common.network.Selector: DEBUG

    # ========== СЕРИАЛИЗАЦИЯ ==========
    org.apache.kafka.common.serialization: DEBUG
    org.springframework.kafka.support.serializer: DEBUG

    # ========== SPRING И KAFKA ==========
    org.springframework.kafka: DEBUG
    org.apache.kafka.clients.consumer: INFO

    # ========== SPRING АВТОКОНФИГУРАЦИЯ ==========
    org.springframework.boot.autoconfigure: INFO
    org.springframework.context: INFO

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

grpc:
  server:
    port: 9090