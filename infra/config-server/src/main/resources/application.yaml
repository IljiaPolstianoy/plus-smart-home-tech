spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations:
            - "classpath:/config/telemetry/{application}"
            - "classpath:/config/commerce/{application}"

server:
  port: 0

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
  client:
    service-url:
      enabled: true
      defaultZone: http://localhost:8761/eureka/