spring:
  application:
    name: analyzer

  config:
    import: "optional:configserver:"

  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server
      fail-fast: false
      retry:
        max-attempts: 5

# gRPC конфигурация
grpc:
  client:
    hub-router:
      address: static://localhost:59091
      negotiation-type: plaintext

# Настройки Kafka
spring.kafka:
  bootstrap-servers: localhost:9092
  consumer:
    group-id: analyzer-group
    auto-offset-reset: earliest
    enable-auto-commit: false

server:
  port: 8085

# Настройки Eureka - ПРОСТАЯ версия без переменных
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    enabled: true
    fetch-registry: true
    register-with-eureka: true
  instance:
    hostname: localhost
    prefer-ip-address: false

# Настройки процессоров
processor:
  initialization:
    timeout: 30000
  poll:
    timeout: 1000

logging:
  level:
    ru.yandex.practicum: INFO
    ru.yandex.practicum.processor: DEBUG
    org.springframework.cloud: INFO