spring:
  application:
    name: analyzer

  config:
    import: "optional:configserver:"

  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server
      fail-fast: false
      retry:
        max-attempts: 5

  # Локальные значения по умолчанию
  kafka:
    consumer:
      group-id: analyzer-group
    properties:
      schema.registry.url: http://localhost:8081

# gRPC - пусть Config Server переопределит
grpc:
  client:
    hub-router:
      address: localhost:59090  # Значение по умолчанию
      negotiation-type: plaintext

server:
  port: 0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/