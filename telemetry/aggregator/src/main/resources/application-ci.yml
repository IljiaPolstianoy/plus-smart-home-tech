# Переопределения для CI окружения
spring:
  cloud:
    config:
      retry:
        max-attempts: 15  # Больше попыток в CI
        initial-interval: 5000  # Дольше ждем

    # Альтернатива: прямое указание URL Config Server
    # uri: http://localhost:8888
    # discovery:
    #   enabled: false

# Упрощаем логирование для CI
logging.level.org.springframework.cloud: WARN
logging.level.com.netflix.discovery: WARN