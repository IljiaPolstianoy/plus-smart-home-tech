spring:
  application:
    name: aggregator

  # Критически важная настройка для Spring Cloud Config
  config:
    import: "optional:configserver:"

  # Настройки для Config Server
  cloud:
    config:
      enabled: true
      fail-fast: false
      retry:
        max-attempts: 3
        initial-interval: 1000
      uri: ""
      discovery:
        enabled: true
        service-id: config-server

  # Локальные значения по умолчанию на случай если Config Server не ответит
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:aggregator-group}

# Дополнительные настройки
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}